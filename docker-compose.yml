# ============================================
# 信用证智能审单系统 - Docker Compose 配置
# ============================================

version: '3.8'

services:
  lc-checker:
    build:
      context: .
      dockerfile: Dockerfile
    image: lc-checker:latest
    container_name: lc-checker
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    volumes:
      # 数据持久化：上传文件
      - ./uploads:/app/uploads
      # 数据持久化：生成报告
      - ./reports_v2:/app/reports_v2
      # 数据持久化：向量数据库（可选，可重建）
      - ./chroma_db:/app/chroma_db
      # PaddleOCR 模型缓存（避免每次重新下载）
      - paddleocr-models:/root/.paddleocr
    
    environment:
      # OpenAI API 配置（必填）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      
      # 可选：自定义模型
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      
      # 工作目录（容器内固定）
      - WORK_DIR=/app
    
    # 资源限制（根据服务器调整）
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

# 命名卷定义
volumes:
  paddleocr-models:
    driver: local
